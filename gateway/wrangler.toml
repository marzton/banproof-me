name                = "banproof-core"
main                = "src/index.ts"
compatibility_date  = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern   = "banproof.me/api/*"
zone_name = "banproof.me"

[observability]
enabled = true

# ── D1 Database (binding: DB) ─────────────────────────────────
[[d1_databases]]
binding       = "DB"
database_name = "bp-core-prod"
database_id   = "54e1a408-4b81-4ca5-b6a4-c2314dc0cf46"

# ── KV Namespaces ─────────────────────────────────────────────
[[kv_namespaces]]
binding = "CACHE"
id      = "af8eb071fce34b5eafbdeb1badd93876"

[[kv_namespaces]]
binding = "INFRA_SECRETS"
id      = "b9824d3280c54573a24137c7e7143b33"

# ── Cloudflare Workflows (binding: ENGINE) ────────────────────
[[workflows]]
binding    = "ENGINE"
name       = "banproof-engine"
class_name = "BanproofEngine"

# ── Cloudflare AI (binding: AI) ───────────────────────────────
[ai]
binding = "AI"

# ── Non-secret vars (production defaults) ────────────────────
[vars]
ENVIRONMENT = "production"
USE_MOCK    = "true"
# Flip USE_MOCK to "false" only after manual UI verification on mobile.
# JWT_SECRET must be set via: wrangler secret put JWT_SECRET

# ── Development environment ───────────────────────────────────
[env.development]
vars = { ENVIRONMENT = "development", USE_MOCK = "true" }

[[env.development.d1_databases]]
binding       = "DB"
database_name = "bp-core-prod"
database_id   = "54e1a408-4b81-4ca5-b6a4-c2314dc0cf46"

[[env.development.kv_namespaces]]
binding = "CACHE"
id      = "af8eb071fce34b5eafbdeb1badd93876"

[[env.development.kv_namespaces]]
binding = "INFRA_SECRETS"
id      = "b9824d3280c54573a24137c7e7143b33"

[[env.development.workflows]]
binding    = "ENGINE"
name       = "banproof-engine"
class_name = "BanproofEngine"

[env.development.ai]
binding = "AI"

# ── Staging environment ───────────────────────────────────────
[env.staging]
vars = { ENVIRONMENT = "staging", USE_MOCK = "true" }

[[env.staging.routes]]
pattern   = "staging-api.banproof.me/api/*"
zone_name = "banproof.me"

[[env.staging.d1_databases]]
binding       = "DB"
database_name = "bp-core-prod"
database_id   = "54e1a408-4b81-4ca5-b6a4-c2314dc0cf46"

[[env.staging.kv_namespaces]]
binding = "CACHE"
id      = "af8eb071fce34b5eafbdeb1badd93876"

[[env.staging.kv_namespaces]]
binding = "INFRA_SECRETS"
id      = "b9824d3280c54573a24137c7e7143b33"

[[env.staging.workflows]]
binding    = "ENGINE"
name       = "banproof-engine"
class_name = "BanproofEngine"

[env.staging.ai]
binding = "AI"
