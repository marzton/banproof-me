name: Deploy Worker

# CF secrets live in goldshore-ai only.
# This workflow fires a repository_dispatch there; goldshore-ai checks out
# this repo, builds it, and deploys using its own credentials.
#
# Required repo secret: GS_DISPATCH_TOKEN
#   A GitHub classic PAT with repo scope on marzton/goldshore-ai.
#   Create at: github.com/settings/tokens

on:
  push:
    branches: [main, staging]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    name: Trigger deploy in goldshore-ai
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch
        run: |
          curl -s --fail -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GS_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/marzton/goldshore-ai/dispatches \
            -d '{
              "event_type": "deploy",
              "client_payload": {
                "repo": "marzton/banproof-me",
                "ref": "${{ github.ref_name }}",
                "working_directory": "gateway",
                "install_command": "npm ci",
                "build_command": "",
                "wrangler_command": "${{ github.ref_name == \'staging\' && \'deploy --env staging\' || \'deploy\' }}",
                "health_check_url": "${{ vars.HEALTH_CHECK_URL }}"
              }
            }'
          echo "Dispatched deploy to goldshore-ai for banproof-me@${{ github.ref_name }}"
