name: Cloudflare Infra Guard

# PR gate: static validation only. Live Cloudflare state is verified
# post-deploy in deploy.yml (job: verify-infra).
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify-cloudflare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: test -f ops/cloudflare-required.json
      - name: Verify Cloudflare token is present
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
      - name: Static route validator
        run: python check_routes.py
      - name: Static bindings validator
        run: python scripts/validate_cloudflare_manifests.py
      - name: Validate routes and DNS
      - name: Required manifests present
        run: |
          test -f ops/cloudflare-required.json
          test -f ops/cloudflare-account-required.json
      - name: Verify Cloudflare secrets are present
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)
      - name: Static route validator
        run: python check_routes.py
      - name: Static bindings validator
        run: python scripts/validate_cloudflare_manifests.py
