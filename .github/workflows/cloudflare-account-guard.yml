name: Cloudflare Account Guard

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify-account-resources:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: test -f ops/cloudflare-account-required.json
      - name: Require account secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || (echo "Missing CLOUDFLARE_API_TOKEN" && exit 1)
          test -n "$CLOUDFLARE_ACCOUNT_ID" || (echo "Missing CLOUDFLARE_ACCOUNT_ID" && exit 1)
