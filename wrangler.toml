// wrangler.jsonc — banproof-me worker configuration
{
  "name": "banproof-me",
  "main": "src/index.ts",
  "compatibility_date": "2025-03-07",
  "compatibility_flags": ["nodejs_compat"],

  "observability": {
    "enabled": true,
    "head_sampling_rate": 1
  },

  // Static assets — SPA fallback for public site
  "assets": {
    "directory": "./public",
    "not_found_handling": "single-page-application",
    "binding": "ASSETS"
  },

  "vars": {
    "ENV": "production"
  },

  // KV
  "kv_namespaces": [
    {
      "binding": "GS_CONFIG",
      "id": "5f13370575784c9dacff522121104cb3"
    }
  ],

  // D1 Databases
  "d1_databases": [
    {
      "binding": "PLATFORM_DB",
      "database_name": "gs_platform_db",
      "database_id": "9703574e-adb7-481e-8d98-96f8ce5f8a90"
    },
    {
      "binding": "AUDIT_DB",
      "database_name": "gs_audit_db",
      "database_id": "1ae71d76-188f-481b-91d9-db2d39013f68"
    }
  ],

  // R2
  "r2_buckets": [
    {
      "binding": "MEDIA_STORE",
      "bucket_name": "gs-assets"
    }
  ],

  // Workflow — AI/sentiment content processing pipeline
  "workflows": [
    {
      "name": "content-processing-workflow",
      "binding": "CONTENT_WORKFLOW",
      "class_name": "ContentProcessingWorkflow"
    }
  ],

  // Queues
  "queues": {
    "producers": [
      {
        "binding": "GS_EVENTS",
        "queue": "goldshore-jobs"
      }
    ],
    "consumers": [
      {
        "queue": "goldshore-jobs",
        "max_batch_size": 10,
        "max_batch_timeout": 30
      }
    ]
  },

  // Email
  "send_email": [
    {
      "name": "SEND_EMAIL"
    }
  ],

  // Service bindings
  "services": [
    {
      "binding": "EMAIL_ROUTER",
      "service": "banproof-email-router"
    }
  ],

  // Analytics Engine — was "analytics_engines" (invalid), now correct key
  "analytics_engine_datasets": [
    {
      "binding": "ANALYTICS",
      "dataset": "banproof_events"
    }
  ],

  // Routes
  "routes": [
    {
      "pattern": "banproof.me/*",
      "zone_name": "banproof.me"
    },
    {
      "pattern": "www.banproof.me/*",
      "zone_name": "banproof.me"
    },
    {
      "pattern": "preview.banproof.me/*",
      "zone_name": "banproof.me"
    }
  ]
}
