name = "banproof.me"
main = "src/index.ts"
compatibility_date = "2025-09-27"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1

[assets]
directory = "./public"
not_found_handling = "single-page-application"
binding = "ASSETS"

[vars]
ENV = "production"

# Canonical route ownership is defined in ops/route-ownership.json.
# This worker must not own banproof.me/www in any environment.

[[routes]]
pattern = "preview.banproof.me/*"
zone_name = "banproof.me"

[env.production.vars]
ENV = "production"

[[env.production.routes]]
pattern = "preview.banproof.me/*"
zone_name = "banproof.me"

[env.staging.vars]
ENV = "staging"

[[env.staging.routes]]
pattern = "preview.banproof.me/*"
zone_name = "banproof.me"

[env.preview.vars]
ENV = "preview"

[[env.preview.routes]]
pattern = "preview.banproof.me/*"
zone_name = "banproof.me"
